<!doctype html>
<html lang="en-US" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <title>Nyan Cat - HTML5+CSS3+JS</title>

    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored);
          }
        } catch (e) {}
      })();
    </script>

    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="/css/nyan.css" />
  </head>
  <body>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light and dark mode">☀️</button>
    <div class="audiocontrols">
      <audio autoplay controls>
        <source src="audio/nyan-cat.ogg" type="audio/ogg" />
        <source src="audio/nyan-cat.mp3" type="audio/mpeg" />
        Your browser does not support the audio element.
      </audio>
    </div>
    <div class="sparks-combo">
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
      <div class="spark"></div>
    </div>

    <div id="wave-a" class="hot rainbow"></div>
    <div id="wave-a" class="cold rainbow"></div>

    <div id="wave-b" class="hot rainbow"></div>
    <div id="wave-b" class="cold rainbow"></div>

    <div id="nyan-cat" class="frame1">
      <div id="tail"></div>

      <div id="paws"></div>

      <div id="pop-tarts-body">
        <div id="pop-tarts-body-cream"></div>
      </div>

      <div id="head">
        <div id="face"></div>
      </div>
    </div>

    <script type="text/javascript" src="/js/nyan.js"></script>
  </body>
</html>
